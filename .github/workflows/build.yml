name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

permissions:
  contents: write

jobs:
  # ── Portable (ZIP) build ─────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore USBShare.csproj -p:Platform=${{ matrix.platform }}

      # dotnet publish drives its own build pass; do NOT use --no-build here
      # because WinUI publish targets differ from the regular build targets.
      - name: Publish (portable, self-contained)
        run: |
          dotnet publish USBShare.csproj `
            -c ${{ env.CONFIGURATION }} `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=${{ matrix.rid }} `
            -p:WindowsPackageType=None `
            --self-contained `
            --no-restore `
            -o publish/${{ matrix.rid }}

      - name: Upload artifact (CI)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: USBShare-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - name: Package and upload ZIP (release)
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = "USBShare-${{ github.event.release.tag_name }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $zip
          gh release upload "${{ github.event.release.tag_name }}" $zip

  # ── MSIX installer build (release only) ─────────────────────────────────────
  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    runs-on: windows-2022
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore USBShare.csproj -p:Platform=${{ matrix.platform }}

      # Prefer a stable signing cert from secrets (official CI pattern).
      # Fallback: generate ephemeral self-signed cert for this release run.
      - name: Prepare signing certificate
        shell: pwsh
        run: |
          if ("${{ secrets.BASE64_ENCODED_PFX }}") {
            [IO.File]::WriteAllBytes("signing-cert.pfx", [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}"))
            "CERT_PFX_PATH=$PWD/signing-cert.pfx" >> $env:GITHUB_ENV
            "CERT_PASSWORD=${{ secrets.PFX_PASSWORD }}" >> $env:GITHUB_ENV
          }
          else {
            $cert = New-SelfSignedCertificate `
              -Subject "CN=0FC81167-3DEA-4950-89C3-0E113BD0A795" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -Type CodeSigningCert `
              -KeyUsage DigitalSignature `
              -HashAlgorithm SHA256

            Export-Certificate `
              -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath "USBShare-${{ matrix.rid }}.cer"

            $certPassword = ConvertTo-SecureString -String "usbshare-ci" -AsPlainText -Force
            Export-PfxCertificate `
              -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath "signing-cert.pfx" `
              -Password $certPassword | Out-Null

            "CERT_PFX_PATH=$PWD/signing-cert.pfx" >> $env:GITHUB_ENV
            "CERT_PASSWORD=usbshare-ci" >> $env:GITHUB_ENV
          }

      - name: Build MSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/msix" | Out-Null

          dotnet build USBShare.csproj `
            -c ${{ env.CONFIGURATION }} `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=${{ matrix.rid }} `
            -p:WindowsPackageType=MSIX `
            -p:GenerateAppxPackageOnBuild=true `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never `
            -p:AppxPackageDir=$PWD/artifacts/msix/ `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateKeyFile=$env:CERT_PFX_PATH `
            -p:PackageCertificatePassword=$env:CERT_PASSWORD `
            --no-restore

      - name: Upload MSIX and certificate
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msix = Get-ChildItem -Recurse -Path "artifacts/msix" -Include "*.msix","*.msixbundle" |
            Select-Object -First 1
          if (-not $msix) { Write-Error "MSIX not found under artifacts/msix"; exit 1 }

          $dest = "USBShare-${{ github.event.release.tag_name }}-${{ matrix.rid }}.msix"
          Copy-Item $msix.FullName $dest
          gh release upload "${{ github.event.release.tag_name }}" $dest
          if (Test-Path "USBShare-${{ matrix.rid }}.cer") {
            gh release upload "${{ github.event.release.tag_name }}" "USBShare-${{ matrix.rid }}.cer"
          }

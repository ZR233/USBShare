name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

jobs:
  # ── Portable (ZIP) build ─────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore USBShare.csproj -p:Platform=${{ matrix.platform }}

      # dotnet publish drives its own build pass; do NOT use --no-build here
      # because WinUI publish targets differ from the regular build targets.
      - name: Publish (portable, self-contained)
        run: |
          dotnet publish USBShare.csproj `
            -c ${{ env.CONFIGURATION }} `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=${{ matrix.rid }} `
            -p:WindowsPackageType=None `
            --self-contained `
            --no-restore `
            -o publish/${{ matrix.rid }}

      - name: Upload artifact (CI)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: USBShare-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - name: Package and upload ZIP (release)
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = "USBShare-${{ github.event.release.tag_name }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $zip
          gh release upload "${{ github.event.release.tag_name }}" $zip

  # ── MSIX installer build (release only) ─────────────────────────────────────
  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    runs-on: windows-2022
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore USBShare.csproj -p:Platform=${{ matrix.platform }}

      # A self-signed cert is required; without signing Windows rejects the MSIX.
      # Users install the bundled .cer into "Trusted People" once, then the MSIX.
      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=zrufo" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -Type CodeSigningCert `
            -KeyUsage DigitalSignature `
            -HashAlgorithm SHA256
          "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Export-Certificate `
            -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath "USBShare-${{ matrix.rid }}.cer"

      - name: Build MSIX
        run: |
          dotnet build USBShare.csproj `
            -c ${{ env.CONFIGURATION }} `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=${{ matrix.rid }} `
            -p:WindowsPackageType=MSIX `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateThumbprint=${{ env.CERT_THUMBPRINT }} `
            --no-restore

      - name: Upload MSIX and certificate
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # AppPackages is nested under the TFM/RID output folder; search recursively.
          $msix = Get-ChildItem -Recurse -Path "bin" -Include "*.msix","*.msixbundle" |
            Where-Object { $_.FullName -notlike "*Dependencies*" } |
            Select-Object -First 1
          if (-not $msix) { Write-Error "MSIX not found under bin\"; exit 1 }

          $dest = "USBShare-${{ github.event.release.tag_name }}-${{ matrix.rid }}.msix"
          Copy-Item $msix.FullName $dest
          gh release upload "${{ github.event.release.tag_name }}" $dest
          gh release upload "${{ github.event.release.tag_name }}" "USBShare-${{ matrix.rid }}.cer"
